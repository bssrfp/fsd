<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Student</title>
</head>
<body>
    <h1>Update Student Details</h1>
    <form id="updateForm">
        <label for="studentId">Student ID:</label>
        <input type="text" id="studentId" required><br><br>
        <label for="studentName">New Student Name:</label>
        <input type="text" id="studentName" required><br><br>
        <button type="submit">Update</button>
    </form>
    <p id="message"></p>
    <script>
        document.getElementById('updateForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('studentId').value.trim();
            const newName = document.getElementById('studentName').value.trim();
            const message = document.getElementById('message');
            
            if (!id || !newName) {
                message.textContent = 'Please fill in all fields.';
                return;
            }
            
            let students = JSON.parse(localStorage.getItem('students')) || [];
            const studentIndex = students.findIndex(student => student.id === id);
            
            if (studentIndex === -1) {
                message.textContent = 'Student with this ID not found.';
                return;
            }
            
            students[studentIndex].name = newName;
            localStorage.setItem('students', JSON.stringify(students));
            message.textContent = 'Student details updated successfully.';
            document.getElementById('updateForm').reset();
        });
    </script>
</body>
</html>
