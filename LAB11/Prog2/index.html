<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Management System</title>

    <!-- Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <div class="card shadow p-4">
        <h2 class="text-center mb-4">Student Management System</h2>

        <!-- Name -->
        <div class="mb-3">
          <label class="form-label">Student Name</label>
          <input
            type="text"
            id="name"
            class="form-control"
            placeholder="Enter Name"
          />
        </div>

        <!-- Age -->
        <div class="mb-3">
          <label class="form-label">Age</label>
          <input
            type="number"
            id="age"
            class="form-control"
            placeholder="Enter Age"
          />
        </div>

        <!-- Course -->
        <div class="mb-3">
          <label class="form-label">Course</label>
          <input
            type="text"
            id="course"
            class="form-control"
            placeholder="Enter Course"
          />
        </div>

        <input type="hidden" id="studentId" />

        <!-- Buttons -->
        <div class="d-grid gap-2">
          <button class="btn btn-primary" onclick="addOrUpdateStudent()">
            Add / Update Student
          </button>
        </div>
      </div>

      <!-- Student Table -->
      <div class="card shadow mt-4 p-4">
        <h4>Student List</h4>
        <table class="table table-bordered mt-3">
          <thead class="table-dark">
            <tr>
              <th>Name</th>
              <th>Age</th>
              <th>Course</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="studentTable"></tbody>
        </table>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        push,
        set,
        onValue,
        remove,
        update,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyC8c5CPwjxsDRu9DQYn1Pzvn9qfYI-FeLc",
        authDomain: "studentmanagementfsd.firebaseapp.com",
        databaseURL:
          "https://studentmanagementfsd-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "studentmanagementfsd",
        storageBucket: "studentmanagementfsd.firebasestorage.app",
        messagingSenderId: "491736203655",
        appId: "1:491736203655:web:5843006e0c93e4c8379322",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      const nameInput = document.getElementById("name");
      const ageInput = document.getElementById("age");
      const courseInput = document.getElementById("course");
      const studentIdInput = document.getElementById("studentId");
      const table = document.getElementById("studentTable");

      // ✅ ADD or UPDATE
      window.addOrUpdateStudent = function () {
        const name = nameInput.value;
        const age = ageInput.value;
        const course = courseInput.value;
        const id = studentIdInput.value;

        if (name === "" || age === "" || course === "") {
          alert("Please fill all fields");
          return;
        }

        if (id === "") {
          // CREATE
          const newRef = push(ref(db, "students"));
          set(newRef, { name, age, course });
          alert("Student Added Successfully!");
        } else {
          // UPDATE
          update(ref(db, "students/" + id), { name, age, course });
          alert("Student Updated Successfully!");
        }

        clearFields();
      };

      // ✅ READ (REAL-TIME AUTO LOAD)
      onValue(ref(db, "students"), (snapshot) => {
        table.innerHTML = "";
        const data = snapshot.val();

        if (!data) return;

        for (let id in data) {
          table.innerHTML += `
      <tr>
        <td>${data[id].name}</td>
        <td>${data[id].age}</td>
        <td>${data[id].course}</td>
        <td>
          <button class="btn btn-warning btn-sm" onclick="editStudent('${id}','${data[id].name}','${data[id].age}','${data[id].course}')">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteStudent('${id}')">Delete</button>
        </td>
      </tr>
    `;
        }
      });

      // ✅ DELETE
      window.deleteStudent = function (id) {
        remove(ref(db, "students/" + id));
        alert("Student Deleted");
      };

      // ✅ EDIT
      window.editStudent = function (id, name, age, course) {
        nameInput.value = name;
        ageInput.value = age;
        courseInput.value = course;
        studentIdInput.value = id;
      };

      // Clear Fields
      function clearFields() {
        nameInput.value = "";
        ageInput.value = "";
        courseInput.value = "";
        studentIdInput.value = "";
      }
    </script>               
  </body>
</html>
